services:
  rihla:
    build: .
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      DATABASE_PATH: /data/rihla.db
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3001}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
    volumes:
      - rihla_data:/data
    restart: unless-stopped

volumes:
  rihla_data:
